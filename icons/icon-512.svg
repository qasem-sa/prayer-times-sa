<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="mosque" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Crescent moon -->
  <circle cx="200" cy="160" r="60" fill="#fbbf24"/>
  <circle cx="220" cy="145" r="50" fill="url(#bg)"/>
  <!-- Stars -->
  <polygon points="320,100 326,118 345,118 330,128 335,146 320,136 305,146 310,128 295,118 314,118" fill="#fbbf24"/>
  <polygon points="380,160 384,172 396,172 386,180 390,192 380,184 370,192 374,180 364,172 376,172" fill="#fbbf24" opacity="0.7"/>
  <!-- Mosque base -->
  <rect x="100" y="320" width="312" height="120" rx="10" fill="url(#mosque)" opacity="0.9"/>
  <!-- Minaret left -->
  <rect x="110" y="220" width="30" height="220" rx="5" fill="url(#mosque)"/>
  <circle cx="125" cy="215" r="18" fill="url(#mosque)"/>
  <circle cx="125" cy="215" r="10" fill="#fbbf24"/>
  <!-- Minaret right -->
  <rect x="372" y="220" width="30" height="220" rx="5" fill="url(#mosque)"/>
  <circle cx="387" cy="215" r="18" fill="url(#mosque)"/>
  <circle cx="387" cy="215" r="10" fill="#fbbf24"/>
  <!-- Main dome -->
  <ellipse cx="256" cy="310" rx="80" ry="70" fill="url(#mosque)"/>
  <ellipse cx="256" cy="310" rx="80" ry="70" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.3"/>
  <!-- Dome top -->
  <circle cx="256" cy="240" r="15" fill="url(#mosque)"/>
  <line x1="256" y1="225" x2="256" y2="240" stroke="#38bdf8" stroke-width="3"/>
  <circle cx="256" cy="222" r="5" fill="#fbbf24"/>
  <!-- Windows -->
  <rect x="170" y="340" width="30" height="50" rx="15" fill="#0f172a" opacity="0.5"/>
  <rect x="220" y="340" width="30" height="50" rx="15" fill="#0f172a" opacity="0.5"/>
  <rect x="262" y="340" width="30" height="50" rx="15" fill="#0f172a" opacity="0.5"/>
  <rect x="312" y="340" width="30" height="50" rx="15" fill="#0f172a" opacity="0.5"/>
  <!-- Side domes -->
  <ellipse cx="165" cy="320" rx="30" ry="25" fill="url(#mosque)" opacity="0.7"/>
  <ellipse cx="347" cy="320" rx="30" ry="25" fill="url(#mosque)" opacity="0.7"/>
</svg>
